<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trill AI Writer · 10 Questions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .bubble-ai { background: linear-gradient(135deg, rgb(30 27 75 / 0.4), rgb(124 58 237 / 0.08)); border: 1px solid rgb(124 58 237 / 0.25); }
    .bubble-user { background: rgb(245 158 11 / 0.08); border: 1px solid rgb(245 158 11 / 0.25); }
    .fade-in { animation: fade 0.3s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chip { transition: all 0.15s; }
    .chip:hover { border-color: rgb(167 139 250 / 0.6); background: rgb(167 139 250 / 0.1); }
    .chip.selected { background: rgb(245 158 11 / 0.15); border-color: rgb(245 158 11 / 0.6); color: rgb(252 211 77); }
  </style>
</head>
<body class="bg-[#0a0617] text-slate-200 min-h-screen">
  <div class="flex h-screen overflow-hidden">
    <aside class="w-56 flex-shrink-0">
      <div id="sidebar"></div>
    </aside>
    <main class="flex-1 flex flex-col overflow-hidden">
      <div id="topbar"></div>
      <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Header w/ progress -->
        <div class="px-6 py-4 border-b border-slate-800/60 flex-shrink-0">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <a href="trigger.html" class="text-xs text-slate-500 hover:text-violet-400">← angle</a>
              <span class="text-slate-700">·</span>
              <h2 class="text-sm font-semibold text-white">"Wins & Misses" recap thread</h2>
              <span class="text-xs text-slate-500">targeting <span class="text-orange-300">Community Confidence</span></span>
            </div>
            <div class="text-xs text-slate-400">Question <span id="qnum" class="text-white font-semibold font-mono">1</span> of 10</div>
          </div>
          <div class="w-full bg-slate-800 rounded-full h-1 overflow-hidden">
            <div id="progress-bar" class="bg-gradient-to-r from-orange-500 to-amber-400 h-full transition-all duration-300" style="width: 10%"></div>
          </div>
        </div>

        <!-- Chat area -->
        <div id="chat" class="flex-1 overflow-y-auto px-6 py-5 scrollbar-thin">
          <div class="max-w-3xl mx-auto space-y-4" id="messages"></div>
        </div>

        <!-- Input area -->
        <div class="px-6 py-4 border-t border-slate-800/60 flex-shrink-0 bg-[#0a0617]">
          <div class="max-w-3xl mx-auto">
            <div id="options-area" class="mb-3 flex flex-wrap gap-2"></div>
            <div class="flex items-center gap-3">
              <input id="text-input" type="text" placeholder="Type your answer..." class="flex-1 bg-slate-900/60 border border-slate-700/50 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-violet-400/60">
              <button id="next-btn" class="px-5 py-2.5 rounded-lg bg-orange-500 hover:bg-orange-400 text-orange-950 text-sm font-semibold transition-colors">
                Next →
              </button>
            </div>
            <div class="mt-2 text-[11px] text-slate-500 text-center">
              Trill AI is using your past 100 tweets, your calls ledger, and your audience archetypes to shape the draft.
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    window.PAGE_KEY = "score";
    window.PAGE_PREFIX = "../";
    window.PAGE_TITLE = "Trill AI Writer";
    window.PAGE_SUBTITLE = "10-question briefing";
  </script>
  <script src="../data/demo-kol.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>

  <script>
    // 10 questions for the "Wins & Misses recap" angle
    const QUESTIONS = [
      {
        ai: "Quick warm-up. What format works best for this recap — a single tweet, a short thread (3-5 posts), or a long thread (8+ posts)?",
        options: ["Single tweet", "Short thread (3-5)", "Long thread (8+)"],
        free: false,
      },
      {
        ai: "How far back should we cover? Recent activity carries more weight; older calls add credibility but dilute focus.",
        options: ["Last 7 days", "Last 30 days", "Last 90 days"],
        free: false,
      },
      {
        ai: "How many calls do you want me to include? More = more credibility, fewer = more depth per call.",
        options: ["Top 3", "Top 5", "Top 10"],
        free: false,
      },
      {
        ai: "Reading your past style, you sound most authentic when you're (pick the closest): data-cold, self-reflective, or playful?",
        options: ["Data-cold", "Self-reflective", "Playful but precise"],
        free: false,
      },
      {
        ai: "For each loser, do you want to include the invalidation thesis (what would have changed your mind earlier)?",
        options: ["Yes, every loser", "Yes, only when clear", "No, just the loss"],
        free: false,
      },
      {
        ai: "Source-linking: do you want explicit price-source citations (Binance, CoinGecko) for every call? This boosts Analytical Depth too.",
        options: ["Yes, for every call", "Only for losers", "Skip — they slow reading"],
        free: false,
      },
      {
        ai: "What's the one meta-lesson you want the audience to take away from this recap? (open answer, 1-2 sentences)",
        options: [],
        free: true,
        placeholder: "e.g. \"position sizing matters more than entry timing\"",
      },
      {
        ai: "Should I embed the Trill verified-calls widget at the end? It auto-pulls your live HIT/PARTIAL/MISS counts, contestable.",
        options: ["Yes — strongest credibility", "No — keep it clean"],
        free: false,
      },
      {
        ai: "When do you want this to go live?",
        options: ["Now (immediately)", "Tonight 9pm UTC", "Tomorrow 8am UTC", "Save as draft"],
        free: false,
      },
      {
        ai: "Final check: include the disclosure tag (Trill methodology badge)? It signals to Trill Sentinel that this counts as an accountability post — adds +0.03 IH on top.",
        options: ["Yes, include", "No"],
        free: false,
      },
    ];

    // Pre-baked sample answers (simulated user actions) — used when "Use suggested" clicked
    const SUGGESTED = ["Long thread (8+)", "Last 30 days", "Top 10", "Self-reflective", "Yes, every loser", "Yes, for every call", "Verifying thesis matters more than calling the top — every miss had a verification step I skipped.", "Yes — strongest credibility", "Tonight 9pm UTC", "Yes, include"];

    let currentQ = 0;
    const answers = [];

    const messagesEl = document.getElementById("messages");
    const optionsEl = document.getElementById("options-area");
    const textInput = document.getElementById("text-input");
    const nextBtn = document.getElementById("next-btn");
    const qnumEl = document.getElementById("qnum");
    const progressEl = document.getElementById("progress-bar");

    function addAIMessage(text) {
      const html = `
        <div class="flex items-start gap-3 fade-in">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-orange-500 via-amber-400 to-violet-500 flex items-center justify-center font-bold text-[#0f0a1f] text-xs flex-shrink-0">AI</div>
          <div class="bubble-ai rounded-lg rounded-tl-none px-4 py-3 text-sm text-slate-200 leading-relaxed flex-1">${text}</div>
        </div>
      `;
      messagesEl.insertAdjacentHTML("beforeend", html);
      messagesEl.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function addUserMessage(text) {
      const html = `
        <div class="flex items-start gap-3 fade-in justify-end">
          <div class="bubble-user rounded-lg rounded-tr-none px-4 py-3 text-sm text-amber-100 max-w-md">${text}</div>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-amber-400 flex items-center justify-center font-bold text-[#0f0a1f] text-xs flex-shrink-0">${DEMO_KOL.avatar}</div>
        </div>
      `;
      messagesEl.insertAdjacentHTML("beforeend", html);
      document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function renderOptions() {
      const q = QUESTIONS[currentQ];
      optionsEl.innerHTML = "";
      if (q.free) {
        textInput.style.display = "block";
        textInput.placeholder = q.placeholder || "Type your answer...";
        textInput.value = "";
        textInput.focus();
      } else {
        textInput.style.display = "none";
        q.options.forEach((opt, i) => {
          const chip = document.createElement("button");
          chip.className = "chip text-xs px-3 py-1.5 rounded-full border border-slate-600/60 text-slate-300 bg-slate-800/40";
          chip.textContent = opt;
          chip.addEventListener("click", () => {
            optionsEl.querySelectorAll(".chip").forEach((c) => c.classList.remove("selected"));
            chip.classList.add("selected");
            optionsEl.dataset.choice = opt;
          });
          optionsEl.appendChild(chip);
        });
        // Add a "use suggested" shortcut
        const suggestBtn = document.createElement("button");
        suggestBtn.className = "chip text-xs px-3 py-1.5 rounded-full border border-violet-500/40 text-violet-300 bg-violet-500/10";
        suggestBtn.textContent = "↺ use Trill AI's suggestion";
        suggestBtn.addEventListener("click", () => {
          const suggested = SUGGESTED[currentQ];
          optionsEl.querySelectorAll(".chip").forEach((c) => c.classList.remove("selected"));
          const match = Array.from(optionsEl.querySelectorAll(".chip")).find((c) => c.textContent === suggested);
          if (match) match.classList.add("selected");
          optionsEl.dataset.choice = suggested;
        });
        optionsEl.appendChild(suggestBtn);
      }
    }

    function next() {
      const q = QUESTIONS[currentQ];
      let answer;
      if (q.free) {
        answer = textInput.value.trim();
        if (!answer) {
          answer = SUGGESTED[currentQ]; // fallback to suggested if user skips
        }
      } else {
        answer = optionsEl.dataset.choice;
        if (!answer) {
          answer = SUGGESTED[currentQ];
        }
      }
      answers.push(answer);
      addUserMessage(answer);

      currentQ += 1;
      if (currentQ >= QUESTIONS.length) {
        // done
        setTimeout(() => {
          addAIMessage("Got everything I need. Generating your draft now — embedding source citations, verified-calls widget, and the Trill disclosure tag. Hold on...");
          nextBtn.textContent = "Open draft →";
          nextBtn.onclick = () => { window.location.href = "draft.html"; };
          optionsEl.innerHTML = "";
          textInput.style.display = "none";
          qnumEl.textContent = "10";
          progressEl.style.width = "100%";
        }, 400);
        return;
      }

      qnumEl.textContent = currentQ + 1;
      progressEl.style.width = ((currentQ + 1) / QUESTIONS.length) * 100 + "%";
      setTimeout(() => {
        addAIMessage(QUESTIONS[currentQ].ai);
        renderOptions();
      }, 350);
    }

    // Kick off
    addAIMessage("Hi Cryptodemo. I've pulled your last 30 days of calls (12 hits, 4 partials, 7 misses, 3 ongoing) and your top-performing thread structure. I'll ask 10 quick questions and then hand you a draft you can review and edit.");
    setTimeout(() => {
      addAIMessage(QUESTIONS[0].ai);
      renderOptions();
    }, 600);

    nextBtn.addEventListener("click", next);
    textInput.addEventListener("keypress", (e) => { if (e.key === "Enter") next(); });
  </script>
</body>
</html>
